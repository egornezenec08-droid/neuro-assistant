        // Функция для запроса к Gemini (через публичный API)

                console.log('Запрос к Gemini API...');
                
                const url = `${FREE_LLM_CONFIG.gemini.apiUrl}?key=${FREE_LLM_CONFIG.gemini.apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: userMessage
                            }]
                        }]
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                        return data.candidates[0].content.parts[0].text;
                    }
                }
                return null;
            } catch (error) {
                console.log('Gemini недоступен:', error.message);
                return null;
            }
        }

                const response = await fetch(url);
                
                if (response.ok) {
                    const text = await response.text();
                    if (text && text.length > 0 && !text.includes('error')) {
                        return text;
                    }
                }
                return null;

        // Основная функция запроса к LLM
        async function queryFreeLLM(userMessage) {
            if (!FREE_LLM_CONFIG.enabled) return null;
            
            // Проверяем кэш
            const cacheKey = userMessage.toLowerCase().trim();
            if (llmCache.has(cacheKey)) {
                console.log('Использую кэшированный ответ');
                return llmCache.get(cacheKey);
            }

            // Пробуем API по очереди
            let response = null;
            
            // 1. Пробуем Gemini
            response = await queryGemini(userMessage);
            
            // 2. Если Gemini не сработал, пробуем Pollinations
            if (!response) {
                response = await queryPollinations(userMessage);
            }
            
            // 3. Если Pollinations не сработал, пробуем DeepInfra
            if (!response) {
                response = await queryDeepInfra(userMessage);
            }
            
            // 4. Если все API не сработали, используем локальный ответ
            if (!response) {
                console.log('API недоступны, использую локальный ответ');
                response = getLocalResponse(userMessage);
            }
            
            // Сохраняем в кэш
            if (response && llmCache.size < 50) {
                llmCache.set(cacheKey, response);
            }
            
            return response;
        }

        // Функция для проверки, стоит ли использовать LLM
        function shouldUseLLM(text) {
            const lowerText = text.toLowerCase();
            
            // Не используем LLM для команд, которые уже обрабатываются
            const localCommands = ['погода', 'время', 'таймер', 'рецепт', 'переведи', 'карту', 'город', 'привет', 'пока', 'спасибо'];
            for (const cmd of localCommands) {
                if (lowerText.includes(cmd) && text.length < 50) {
                    return false;
                }
            }
            
            // Используем для вопросов
            const questionWords = ['что', 'кто', 'где', 'когда', 'почему', 'зачем', 'как', 'какой', 'сколько', 'откуда', 'расскажи'];
            if (questionWords.some(word => lowerText.includes(word))) {
                return true;
            }
            
            // Используем для длинных запросов
            if (text.length > 60) {
                return true;
            }
            
            return false;
        }

        // Функция для проверки, стоит ли использовать Википедию
        function shouldUseWikipedia(text) {
            const lowerText = text.toLowerCase();
            
            // Ключевые слова, которые указывают на запрос фактов
            const wikiKeywords = [
                'кто такой', 'кто такая', 'что такое', 'что значит',
                'определение', 'история', 'биография', 'кто это',
                'расскажи о', 'расскажи про', 'информация о',
                'подробнее о', 'узнать о', 'найти информацию', 
                'расскажи', 'скажи'
            ];
            
            for (const keyword of wikiKeywords) {
                if (lowerText.includes(keyword)) {
                    return true;
                }
            }
            
            // Если запрос начинается с вопросительных слов
            const questionStart = ['что', 'кто', 'где', 'когда', 'почему'];
            const words = lowerText.split(' ');
            if (words.length > 0 && questionStart.includes(words[0])) {
                return true;
            }
            
            return false;
        }

        // Основная функция для получения информации из Википедии
        async function queryWikipedia(userMessage) {
            if (!WIKI_CONFIG.enabled) return null;
            
            // Очищаем запрос от лишних слов
            let query = userMessage
                .replace(/расскажи|пожалуйста|о|про|что такое|кто такой|кто такая|что значит|определение/gi, '')
                .trim();
            
            // Если запрос слишком короткий, пробуем использовать оригинал
            if (query.length < 3) {
                query = userMessage;
            }
            
            console.log('Запрос к Википедии (очищенный):', query);
            
            // Проверяем кэш
            const cacheKey = query.toLowerCase().trim();
            if (wikiCache.has(cacheKey)) {
                console.log('Использую кэшированный ответ из Википедии');
                return wikiCache.get(cacheKey);
            }
            
            // Пробуем получить информацию
            let response = await searchWikipedia(query);
            
            // Если не нашли, пробуем прямой запрос
            if (!response) {
                console.log('Пробуем прямой запрос к статье');
                response = await getWikipediaSummary(query);
            }
            
            // Сохраняем в кэш
            if (response) {
                if (wikiCache.size >= 30) {
                    const firstKey = wikiCache.keys().next().value;
                    wikiCache.delete(firstKey);
                }
                wikiCache.set(cacheKey, response);
                return response;
            }
            
            return null;
        }

        // ==================== ФУНКЦИИ ТАЙМЕРА ====================
        function setTimer(timeString) {
            if (currentTimer) clearInterval(currentTimer);
            
            let totalSeconds = 0;
            const timeParts = timeString.split(/[^0-9]/).filter(part => part !== '');
            
            if (timeParts.length === 0) return 'Некорректный формат времени!';
            
            let hours = 0, minutes = 0, seconds = 0;
            
            if (timeString.includes('час')) {
                hours = parseInt(timeParts[0]) || 0;
                if (timeParts.length > 1) minutes = parseInt(timeParts[1]) || 0;
            } else {
                minutes = parseInt(timeParts[0]) || 0;
                if (timeParts.length > 1) seconds = parseInt(timeParts[1]) || 0;
            }
            
            totalSeconds = hours * 3600 + minutes * 60 + seconds;
            if (totalSeconds <= 0) return 'Время должно быть больше нуля!';
            
            currentTimer = setInterval(() => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                document.getElementById('timer-value').innerHTML = 
                    `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
                if (totalSeconds <= 0) {
                    clearInterval(currentTimer);
                    document.getElementById('timer-display').style.display = 'none';
                    speakText('Таймер завершён!');
                }
                totalSeconds--;
            }, 1000);
            
            document.getElementById('timer-display').style.display = 'block';
            return 'Таймер установлен!';
        }

        // Определение страны по телефонному коду (без ключа)
        async function getCountryByPhoneCode(code) {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,idd,cca2');
                
                if (response.ok) {
                    const countries = await response.json();
                    
                    const cleanCode = code.replace(/\D/g, '');
                    
                    const country = countries.find(c => 
                        c.idd?.root && 
                        (c.idd.root + (c.idd.suffixes?.[0] || '')).includes(cleanCode)
                    );
                    
                    if (country) {
                        return `📞 Телефонный код +${cleanCode} принадлежит стране:
        🏳️ ${country.name.common}
        🔤 Код страны: ${country.cca2}`;
                    }
                }
                
                return '❌ Страна не найдена';
                
            } catch (error) {
                console.error('Ошибка определения страны:', error);
                return '❌ Не удалось определить страну';
            }
        }

        // Генерация надежного пароля
        function generatePassword(length = 12) {
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            const allChars = uppercase + lowercase + numbers + symbols;
            
            let password = '';
            
            // Гарантируем наличие хотя бы одного символа каждого типа
            password += uppercase[Math.floor(Math.random() * uppercase.length)];
            password += lowercase[Math.floor(Math.random() * lowercase.length)];
            password += numbers[Math.floor(Math.random() * numbers.length)];
            password += symbols[Math.floor(Math.random() * symbols.length)];
            
            // Добиваем до нужной длины
            for (let i = password.length; i < length; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }
            
            // Перемешиваем
            password = password.split('').sort(() => Math.random() - 0.5).join('');
            
            // Оценка надежности
            let strength = '🔴 Слабый';
            if (length >= 8 && /[A-Z]/.test(password) && /[a-z]/.test(password) && /[0-9]/.test(password)) {
                strength = '🟡 Средний';
            }
            if (length >= 12 && /[A-Z]/.test(password) && /[a-z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
                strength = '🟢 Надежный';
            }
            
            return `🔐 Сгенерированный пароль (${length} символов):\n${password}\n\nНадежность: ${strength}`;
        }

        async function getOpenMeteoWeather(lat = LAT, lon = LON, city = DEFAULT_CITY) {
            // Функция для получения эмодзи по температуре
            function getTemperatureEmoji(temp) {
                if (temp < -20) return '🥶';
                if (temp < -10) return '❄️';
                if (temp < 0) return '⛄';
                if (temp < 10) return '🌬️';
                if (temp < 20) return '🌱';
                if (temp < 30) return '🌞';
                return '🔥';
            }
            
            // Пытаемся получить реальную погоду
            try {
                console.log(`Запрос погоды для: ${city} (${lat}, ${lon})`);
                
                // Пробуем Open-Meteo API
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
                
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.current_weather) {
                        const current = data.current_weather;
                        
                        // Расшифровка погодных кодов
                        const conditions = {
                            0: '☀️ Ясно', 1: '🌤 Преимущественно ясно', 2: '⛅ Переменная облачность',
                            3: '☁️ Пасмурно', 45: '🌫 Туман', 48: '🌫 Изморозь',
                            51: '🌧 Легкая морось', 53: '🌧 Умеренная морось', 55: '🌧 Сильная морось',
                            61: '🌧 Небольшой дождь', 63: '🌧 Умеренный дождь', 65: '🌧 Сильный дождь',
                            71: '🌨 Небольшой снег', 73: '🌨 Умеренный снег', 75: '🌨 Сильный снег',
                            80: '🌧 Небольшие ливни', 81: '🌧 Умеренные ливни', 82: '🌧 Сильные ливни',
                            85: '🌨 Небольшой снегопад', 86: '🌨 Сильный снегопад',
                            95: '⛈ Гроза', 96: '⛈ Гроза с градом', 99: '⛈ Сильная гроза'
                        };
                        
                        const tempEmoji = getTemperatureEmoji(current.temperature);
                        const weatherDesc = conditions[current.weathercode] || '❓ Неизвестно';
                        
                        return `${tempEmoji} Погода в ${city}:
        🌡 Температура: ${current.temperature}°C
        📌 ${weatherDesc}
        💨 Ветер: ${current.windspeed} км/ч
        🧭 Направление: ${current.winddirection}°`;
                    }
                }
            } catch (error) {
                console.log('Open-Meteo не работает, пробуем wttr.in');
            }
            
            // Если Open-Meteo не сработал, пробуем wttr.in
            try {
                const wttrUrl = `https://wttr.in/${encodeURIComponent(city)}?format=%t+%c+%w&m&lang=ru`;
                const wttrResponse = await fetch(wttrUrl);
                
                if (wttrResponse.ok) {
                    const wttrText = await wttrResponse.text();
                    return `🌤 Погода в ${city}:\n${wttrText.trim()}`;
                }
            } catch (error) {
                console.log('wttr.in тоже не работает');
            }
            
            // Если оба API не работают, возвращаем красивые тестовые данные
            const mockTemperatures = [-5, -2, 0, 3, 5, 8, 10, 12, 15];
            const mockConditions = ['☀️ Ясно', '⛅ Облачно', '☁️ Пасмурно', '🌧 Дождь', '🌨 Снег', '🌫 Туман'];
            const mockWinds = [2, 5, 8, 10, 12, 15];
            
            const randomTemp = mockTemperatures[Math.floor(Math.random() * mockTemperatures.length)];
            const randomCondition = mockConditions[Math.floor(Math.random() * mockConditions.length)];
            const randomWind = mockWinds[Math.floor(Math.random() * mockWinds.length)];
            const tempEmoji = getTemperatureEmoji(randomTemp);
            
            return `${tempEmoji} Погода в ${city} (демо-режим):
        🌡 Температура: ${randomTemp}°C
        📌 ${randomCondition}
        💨 Ветер: ${randomWind} км/ч`;
        }

        function getCurrentDateTime() {
            const now = new Date();
            const days = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const months = ['Января', 'Февраля', 'Марта', 'Апреля', 'Мая', 'Июня', 'Июля', 'Августа', 'Сентября', 'Октября', 'Ноября', 'Декабря'];
            
            return {
                date: `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`,
                time: now.toLocaleTimeString(),
                weekDay: days[now.getDay()]
            };
        }

        function calculateExpression(expression) {
            try {
                const result = eval(expression.replace(/\^/g, '**').replace(/pi/g, 'Math.PI'));
                return isNaN(result) ? 'Ошибка вычисления' : `Результат: ${result}`;
            } catch {
                return 'Ошибка в выражении';
            }
        }

        function searchInRecipesDB(query) {
            const lowerQuery = query.toLowerCase();
            for (const recipe of RECIPES_DB) {
                if (recipe.title.toLowerCase().includes(lowerQuery) || 
                    (recipe.aliases && recipe.aliases.some(a => a.includes(lowerQuery)))) {
                    return formatRecipe(recipe);
                }
            }
            return null;
        }

                const dt = getCurrentDateTime();

            }

                return `Сегодня ${dt.date}, ${dt.weekDay}`;

                return await getCurrencyRates();
            }

            if (['поставь таймер', 'таймер на'].some(phrase => lowerText.includes(phrase))) {
                const timeMatch = lowerText.match(/таймер на (.*)/i);
                if (timeMatch) {
                    const result = setTimer(timeMatch[1].trim());
                    return result === 'Таймер установлен!' ? 'Таймер установлен!' : 'Ошибка установки таймера';
                }
                return 'Укажите время для таймера';
            }

            // Рецепты
            if (['рецепт', 'как приготовить'].some(word => lowerText.includes(word))) {
                const query = text.replace(/рецепт|как приготовить/gi, '').trim();
                const recipe = searchInRecipesDB(query);
                return recipe || 'Рецепт не найден';
            }

            // Перевод
            if (lowerText.includes('переведи')) {
                const textToTranslate = text.replace(/переведи|на|с|языка/gi, '').trim();
                if (!textToTranslate) return 'Укажите текст для перевода.';
                
                let sourceLang = 'ru', targetLang = 'en';
                if (lowerText.includes('на русский')) targetLang = 'ru';
                if (lowerText.includes('на английский')) targetLang = 'en';
                if (lowerText.includes('с русского')) sourceLang = 'ru';
                if (lowerText.includes('с английского')) sourceLang = 'en';
                
                return await translateText(textToTranslate, sourceLang, targetLang);
            }

            // Погода
            if (lowerText.includes('погода') || lowerText.includes('погоду')) {
                try {
                    // Пытаемся получить геолокацию
                    if (navigator.geolocation) {
                        try {
                            const position = await new Promise((resolve, reject) => {
                                navigator.geolocation.getCurrentPosition(
                                    resolve, 
                                    reject, 
                                    { timeout: 5000, enableHighAccuracy: false }
                                );
                            });
                            
                            // Если геолокация получена
                            return await getOpenMeteoWeather(
                                position.coords.latitude, 
                                position.coords.longitude, 
                                'вашем городе'
                            );
                        } catch (geoError) {
                            console.log('Геолокация не доступна, используем Москву');
                            // Если геолокация не доступна, используем Москву
                            return await getOpenMeteoWeather(LAT, LON, DEFAULT_CITY);
                        }
                    } else {
                        // Браузер не поддерживает геолокацию
                        return await getOpenMeteoWeather(LAT, LON, DEFAULT_CITY);
                    }
                } catch (error) {
                    console.error('Ошибка:', error);
                    return 'Не удалось получить данные о погоде. Попробуйте позже.';
                }
            }

            // Карта
            if (['открой карту'].some(phrase => lowerText.includes(phrase))) {
                return await openMap();
            }
            if (['закрой карту'].some(phrase => lowerText.includes(phrase))) {
                return closeMap();
            }

            // Поиск города
            if (lowerText.startsWith('город ')) {
                return await searchGeoName(lowerText.replace('город ', '').trim());
            }

            // Поиск в базе знаний
            try {
                if (knowledgeBase && knowledgeBase.length > 0) {
                    for (const item of knowledgeBase) {
                        if (item.keywords && Array.isArray(item.keywords)) {
                            // Проверяем, все ли ключевые слова есть в запросе
                            const allKeywordsFound = item.keywords.every(keyword => 
                                lowerText.includes(keyword.toLowerCase())
                            );
                            if (allKeywordsFound) {
                                return item.response;
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка поиска в БД:', error);
            }

            // Пробуем найти информацию в Википедии
            if (shouldUseWikipedia(text)) {
                const wikiResponse = await queryWikipedia(text);
                if (wikiResponse) {
                    return wikiResponse;
                }
            }

            // Если ничего не нашли в локальной базе, пробуем LLM
            if (shouldUseLLM(text)) {
                const llmResponse = await queryFreeLLM(text);
                if (llmResponse) {
                    return llmResponse;
                }
            }

            // Генерация изображения
            if (lowerText.startsWith('нарисуй ') || lowerText.startsWith('сгенерируй изображение ')) {
                const prompt = text.replace(/нарисуй|сгенерируй изображение/gi, '').trim();
                if (prompt) {
                    generateImage(prompt);
                    return '🎨 Начинаю генерацию...';
                }
                return 'Укажите, что нарисовать';
            }

            // Новости
            if (lowerText.includes('новости') || lowerText.includes('новост')) {
                const query = text.replace(/новости|покажи|найди/gi, '').trim() || 'новости';
                return await getNews(query);
            }

            // Случайный факт
            if (lowerText.includes('факт') || lowerText.includes('интересный факт')) {
                return await getRandomFact();
            }

            // Поиск фильма
            if (lowerText.includes('фильм ') || lowerText.includes('кино ')) {
                const movie = text.replace(/фильм|кино|найди|информация о/gi, '').trim();
                return await searchMovie(movie);
            }

            // Криптовалюты
            if (lowerText.includes('криптовалюта') || lowerText.includes('биткоин') || lowerText.includes('крипта')) {
                return await getCryptoRates();
            }

            // Шутка
            if (lowerText.includes('шутка') || lowerText.includes('анекдот') || lowerText.includes('рассмеши')) {
                return await getJoke();
            }

            // Телефонный код страны
            if (lowerText.includes('код страны +') || lowerText.includes('телефонный код')) {
                const code = text.match(/\+\d+/)?.[0];
                if (code) {
                    return await getCountryByPhoneCode(code);
                }
                return 'Укажите телефонный код (например: +7)';
            }

            // Генерация пароля
            if (lowerText.includes('пароль') || lowerText.includes('сгенерируй пароль')) {
                const lengthMatch = text.match(/\d+/);
                const length = lengthMatch ? parseInt(lengthMatch[0]) : 12;
                return generatePassword(Math.min(Math.max(length, 8), 24));
            }

            // Математика
            const mathTriggers = ['реши', 'посчитай', 'сколько будет'];
            if (mathTriggers.some(trigger => lowerText.includes(trigger)) || /[\d+\-*\/()]/.test(text)) {
                return calculateExpression(text.replace(/[а-яё\s]/gi, ''));
            }

            // Команды
            if (lowerText === 'помощь') {
                return 'Команды: привет, как дела, пока, спасибо, время, дата, курс валют, таймер на [время], рецепт [блюдо], переведи [текст], погода, открой карту, город [название], реши [пример]';
            }

            return 'Я не смог найти ответ на ваш вопрос. Попробуйте переформулировать свой запрос.';
        }

        // ==================== ОТПРАВКА СООБЩЕНИЙ ====================
        async function sendMessage() {
            const userMessage = userInput.value.trim();
            if (!userMessage) return;

            // Добавляем сообщение пользователя
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = userMessage;
            messageList.appendChild(userMsg);

            userInput.value = '';

            // Показываем индикатор загрузки
            showLoading();

            // Получаем ответ
            const startTime = Date.now();
            const response = await getAssistantResponse(userMessage);
            const endTime = Date.now();
            
            // Убираем индикатор
            hideLoading();

            // Добавляем ответ ассистента
            const assistantMsg = document.createElement('div');
            assistantMsg.className = 'message assistant';
            assistantMsg.textContent = response;
            messageList.appendChild(assistantMsg);

            // Если ответ пришел от LLM, можно добавить маленькую метку (опционально)
            if (response.length > 100 && !response.includes('команды:')) {
                // Можно добавить эмодзи робота для LLM-ответов
                assistantMsg.textContent = response;
            } else {
                assistantMsg.textContent = response;
            }
            
            messageList.appendChild(assistantMsg);

            // Прокрутка вниз
            messageList.scrollTop = messageList.scrollHeight;

            // Озвучиваем ответ
            speakText(response);
        }

        // ==================== РАСПОЗНАВАНИЕ РЕЧИ ====================
        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                mikrofon.disabled = true;
                mikrofon.textContent = 'Голосовой ввод недоступен';
                return null;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().replace(/[.!?]$/, '');
                userInput.value = transcript;
                sendMessage();
            };

            recognition.onerror = (event) => {
                console.error('Ошибка распознавания:', event.error);
                mikrofon.textContent = 'Сказать';
                
                let message = 'Ошибка распознавания';
                if (event.error === 'not-allowed') message = 'Доступ к микрофону запрещён';
                else if (event.error === 'no-speech') message = 'Речь не обнаружена';
                
                // const errorMsg = document.createElement('div');
                // errorMsg.className = 'message assistant';
                // errorMsg.textContent = message;
                // messageList.appendChild(errorMsg);
            };

            recognition.onend = () => {
                mikrofon.textContent = 'Сказать';
            };

            return recognition;
        }

        function randomEyeMovementFixed() {
            const pupils = document.querySelectorAll('.pupil');
            
            // Массив возможных позиций
            const positions = [
                { x: 0, y: 75 },    // центр
                { x: 50, y: 75 },   // право
                { x: 25, y: 75 },  // лево
                { x: 40, y: 40 },   // верх-право
                { x: 40, y: 40 },  // верх-лево
                { x: 10, y: 125 },  // низ-право
                { x: 10, y: 125 }, // низ-лево
                { x: 0, y: 25 },    // верх
                { x: 0, y: 125 },   // низ
                { x: 50, y: 50 },   // далеко право-верх
                { x: 50, y: 50 },  // далеко лево-верх
                { x: 30, y: 100 },  // право-низ
                { x: 5, y: 100 }  // лево-низ
            ];
            
            function moveEyes() {
                // Выбираем случайную позицию
                const randomPos = positions[Math.floor(Math.random() * positions.length)];
                
                pupils.forEach(pupil => {
                    pupil.style.transform = `translate(${randomPos.x}px, ${randomPos.y}px)`;
                    pupil.style.transition = 'transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55)'; // плавное движение с эффектом
                });
            }
            
            // Первое движение
            setTimeout(moveEyes,1000);
            
            // Движение каждые 2-5 секунд
            setInterval(() => {
                moveEyes();
            }, Math.random() * 3000 + 2000);
        }

        window.addEventListener('load', () => {
            randomEyeMovementFixed();
        });

    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            background-color: #05d54e;
            color: white;
            font-family: inherit;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #04b243;
        }

        #chat_from, #setting {
            width: 50%;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s;
        }

        #setting {
            display: none;
        }

        #setting button {
            width: 100%;
            margin: 5px 0;
        }

        .message-list {
            height: 300px;
            background-color: #f9f9f9;
            border-radius: 4px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
        }

        .chat {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            color: #333;
            caret-color: #05d54e;
            transition: width 0.3s;
        }

        #mapContainer {
            display: none;
            height: 400px;
            width: 100%;
            margin-top: 10px;
            border-radius: 4px;
        }

        #mikrofon, #exit_chat {
            background-color: #6c757d;
            margin: 0 10px 10px 0;
        }

        #mikrofon:hover, #exit_chat:hover {
            background-color: #545b62;
        }

        .message {
            margin: 5px 0;
            padding: 8px 16px;
            border-radius: 4px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #05d54e;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background-color: #ddd;
            color: #333;
            margin-right: auto;
        }

        .color {
            margin: 20px 0;
        }

        .color h3, .voice-settings h3, .eye-position h3 {
            margin-bottom: 10px;
        }

        #light, #dark {
            width: 48%;
            display: inline-block;
        }

        #light {
            background-color: #f8d7da;
            color: #721c24;
        }

        #dark {
            background-color: #d4edf7;
            color: #0c5460;
        }

        /* Настройки голоса */
        .voice-settings {
            margin: 20px 0;
        }

        .voice-speed {
            margin-top: 10px;
        }

        .voice-speed label {
            display: block;
            margin-bottom: 5px;
        }

        .voice-speed input {
            width: 100%;
        }

        #clearChat {
            background-color: #dc3545;
            margin-top: 10px;
        }

        #clearChat:hover {
            background-color: #c82333;
        }

        /* Тёмная тема */
        body.dark-mode {
            background-color: #343a40;
            color: #f8f9fa;
        }

        body.dark-mode #chat_from,
        body.dark-mode #setting {
            background-color: #495057;
            color: #f8f9fa;
        }

        body.dark-mode .message.assistant {
            background-color: #6c757d;
            color: #f8f9fa;
        }

        body.dark-mode #userInput {
            background-color: #6c757d;
            color: #f8f9fa;
            border-color: #495057;
        }

        body.dark-mode #userInput::placeholder {
            color: #adb5bd;
        }

                /* Глаза */
        .eyes {
            position: fixed;
            top: 30%;
            left: 10%;
            display: flex;
            gap: 20px;
            z-index: 9999;
        }

        .eye {
            width: 100px;
            height: 200px;
            border-radius: 15%;
            background-color: rgb(77, 210, 106);
            box-shadow: 0 0 5px black;
        }

        .pupil {
            width: 50px;
            height: 75px;
            border-radius: 15%;
            background-color: rgb(128, 246, 120);
            animation: blink 3s infinite, lookAround 10s infinite;
        }

        @keyframes blink {
            90% { opacity: 1; }
            92% { opacity: 0; }
            94% { opacity: 1; }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            #chat_from, #setting {
                width: 90%;
                margin: 20px auto;
            }
            
            .eyes {
                display: none;
            }
            
            .message {
                max-width: 90%;
            }
        }

        @media (max-width: 480px) {
            .message-list {
                height: 250px;
            }
            
            #userInput {
                font-size: 14px;
            }
            
            button {
                padding: 8px 12px;
                font-size: 14px;
            }
        }

        /* Индикатор загрузки */
        #loading {
            text-align: center;
            padding: 10px;
            color: #6c757d;
            font-style: italic;
        }
    </style>
</body>
</html>
